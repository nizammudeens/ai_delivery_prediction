services:
  - type: web
    name: ai-delivery-backend
    runtime: python
    startCommand: gunicorn --worker-class sync --workers 2 --timeout 60 --bind 0.0.0.0:$PORT wsgi:app
    buildCommand: pip install -r requirements.txt
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: 1
    buildFilter:
      paths:
        - backend/**
        - wsgi.py
        - requirements.txt

  - type: static
    name: ai-delivery-frontend
    staticPublishPath: frontend
    buildFilter:
      paths:
        - frontend/**
